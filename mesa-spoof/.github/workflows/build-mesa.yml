#requires -Version 5.1
<#
.SYNOPSIS
    Configure + build a Windows OpenGL ICD (opengl32.dll, llvmpipe) from a
    patched Mesa tree.

.NOTES
    Must be run from a "x64 Native Tools Command Prompt for VS 2022" (or any
    shell where cl.exe / link.exe are on PATH). The single hardest prerequisite
    is a Windows LLVM build that llvmpipe can link against - see README.md.

    Output: <MesaRoot>\builddir\src\gallium\targets\libgl-gdi\opengl32.dll
#>
param(
    [string]$MesaRoot  = ".\mesa",
    [string]$BuildDir  = "builddir",
    [string]$Prefix    = "C:\mesa-out"
)

$ErrorActionPreference = 'Stop'

function Need($name, $hint) {
    if (-not (Get-Command $name -ErrorAction SilentlyContinue)) {
        throw "Missing prerequisite: '$name'. $hint"
    }
}

Need meson "Install with: pip install meson mako"
Need ninja "Install with: winget install Ninja-build.Ninja"
Need cl    "Run this from a 'x64 Native Tools Command Prompt for VS 2022'."

if (-not (Test-Path (Join-Path $MesaRoot 'meson.build'))) {
    throw "No meson.build in $MesaRoot - is that the Mesa source root?"
}

Push-Location $MesaRoot
try {
    $build = Join-Path $MesaRoot $BuildDir

    if (-not (Test-Path $build)) {
        Write-Host "[*] meson setup ..." -ForegroundColor Cyan
        # llvmpipe = software rasterizer -> self-contained opengl32.dll ICD.
        # Everything not needed for a Windows GL ICD is turned off to cut deps.
        meson setup $BuildDir `
            -Dbuildtype=release `
            -Dgallium-drivers=llvmpipe `
            -Dvulkan-drivers= `
            -Dglx=disabled `
            -Degl=disabled `
            -Dgbm=disabled `
            -Dosmesa=true `
            -Dshared-glapi=enabled `
            -Dgles1=disabled `
            -Dgles2=enabled `
            "--prefix=$Prefix"
    } else {
        Write-Host "[=] Reusing existing $BuildDir (delete it for a clean reconfigure)." -ForegroundColor Yellow
    }

    Write-Host "[*] ninja ..." -ForegroundColor Cyan
    ninja -C $BuildDir

    $dll = Join-Path $build 'src\gallium\targets\libgl-gdi\opengl32.dll'
    if (Test-Path $dll) {
        Write-Host ""
        Write-Host "[+] Built ICD: $dll" -ForegroundColor Green
        Write-Host "    Deploy it next to your browser, or as system opengl32 - see README.md."
    } else {
        Write-Warning "Build finished but opengl32.dll not found at the expected path."
        Write-Host    "Search the build dir for opengl32.dll:"
        Get-ChildItem -Path $build -Recurse -Filter opengl32.dll -ErrorAction SilentlyContinue |
            ForEach-Object { Write-Host "    $($_.FullName)" }
    }
}
finally {
    Pop-Location
}
